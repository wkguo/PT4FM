# PT4FM stage-2: value-model SFT (RECAP categorical value + optional IQL expectile)
#
# Usage:
#   bash scripts/2_train_value.sh libero_value
#
# This mirrors RLinf's examples/recap/value/config/libero_sft_value.yaml and adds
# the (config-gated) PT4FM `actor.model.expectile` knob. With expectile.enabled=false
# (or tau=0.5) it reproduces RECAP value training exactly.

defaults:
  - model/value@actor.model
  - training_backend/fsdp@actor.fsdp_config
  - _self_
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    # Resolves model/value + training_backend/fsdp group defaults from RLinf.
    - file://${oc.env:REPO_PATH}/examples/sft/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all

runner:
  task_type: sft
  logger:
    log_path: "../results"
    project_name: pt4fm
    experiment_name: "pt4fm_value"
    logger_backends: ["tensorboard"]
  max_epochs: 30000
  max_steps: -1
  val_check_interval: 500
  save_interval: 3000

data:
  # Must match stage-1 returns tag; loads meta/returns_{tag}.parquet.
  tag: null
  train_data_paths:
    - dataset_path: "/path/to/sft_dataset"
      type: "sft"
      weight: 1.0
      robot_type: "libero"
      model_type: "pi05"
  eval_data_paths:
    - dataset_path: "/path/to/eval_dataset"
      max_samples: 10000
      robot_type: "libero"
      model_type: "pi05"
  train_num_workers: 8
  eval_num_workers: 4
  prefetch_factor: 4
  persistent_workers: false
  pin_memory: false
  include_state: true
  gamma: 1.0
  action_horizon: 10
  normalize_to_minus_one_zero: true
  include_next_obs: false
  action_dim: 7
  robot_type: "libero"
  model_type: "pi05"
  balance_weights: true
  seed: 42

algorithm:
  adv_type: gae

actor:
  group_name: "ActorGroup"
  training_backend: "fsdp"
  micro_batch_size: 32
  global_batch_size: 256
  seed: 0

  model:
    precision: bf16
    siglip_path: "/path/to/siglip2-so400m-patch14-224"
    gemma3_path: "/path/to/gemma-3-270m"
    tokenizer_path: "/path/to/gemma-3-270m"
    freeze_vlm: false
    action_dim: 7
    action_horizon: 10

    # -------- PT4FM: IQL expectile value (config-gated) ----------------------
    # enabled=false reproduces RECAP MC-return categorical regression.
    # tau>0.5 biases V toward the best in-support return (sharper advantage).
    expectile:
      enabled: false
      tau: 0.7

  optim:
    lr: 5.0e-5
    value_lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.95
    adam_eps: 1.0e-8
    weight_decay: 1e-10
    clip_grad: 1.0
    lr_scheduler: "constant"
    lr_warmup_steps: 500
    total_training_steps: 8000

  fsdp_config:
    strategy: "fsdp"
    sharding_strategy: "no_shard"
    use_orig_params: False
    gradient_checkpointing: False
    mixed_precision:
      param_dtype: ${actor.model.precision}
      reduce_dtype: ${actor.model.precision}
      buffer_dtype: ${actor.model.precision}

reward:
  use_reward_model: False

critic:
  use_critic_model: False
